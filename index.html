<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>محمد & رحمة | ذكرى حبنا الأولى</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700&family=Playfair+Display:ital,wght=1,600&display=swap" rel="stylesheet">
</head>
<body>

    <div id="welcome-screen" class="welcome-overlay">
        <div class="welcome-box">
            <span class="heart-pulse">❤️</span>
            <h2 class="welcome-text">مرحباً بكِ يا رحمة..</h2>
            <button class="start-btn" onclick="startEverything()">اضغطي هنا يا رورو ✨</button>
        </div>
    </div>

    <audio id="bg-music" src="song.mp3" loop prefetch></audio>

    <div class="background-glow"></div>

    <div class="container main-content" id="main-site">
        
        <header class="hero-section">
            <h2 class="couple-names">محمد و رحمة</h2>
            <h1 class="main-title">عيد ذكرى حبنا الأول، يا روحي!</h1>
            <p class="subtitle">٢١ يونيو ٢٠٢٥ — اليوم الذي اعترفنا فيه بحبنا</p>
            <div class="gold-divider">
                <span class="line"></span>
                <span class="diamond">◆</span>
                <span class="line"></span>
            </div>
        </header>

        <section class="counter-section">
            <p class="counter-title">لقد مر على أول اعتراف بحبنا...</p>
            <div class="countdown-container" id="countdown">
                <div class="time-box">
                    <span class="time-num" id="years">00</span>
                    <span class="time-label">سنوات</span>
                </div>
                <div class="time-box">
                    <span class="time-num" id="months">00</span>
                    <span class="time-label">شهور</span>
                </div>
                <div class="time-box">
                    <span class="time-num" id="days">00</span>
                    <span class="time-label">أيام</span>
                </div>
                <div class="time-box">
                    <span class="time-num" id="hours">00</span>
                    <span class="time-label">ساعات</span>
                </div>
                <div class="time-box">
                    <span class="time-num" id="minutes">00</span>
                    <span class="time-label">دقائق</span>
                </div>
                <div class="time-box highlight">
                    <span class="time-num" id="seconds">00</span>
                    <span class="time-label">ثواني</span>
                </div>
            </div>
        </section>

        <section class="cards-section">
            <h3 class="section-title">أشياء أحبها فيكِ</h3>
